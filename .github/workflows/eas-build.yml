# ──────────────────────────────────────────────────────────────
# EAS Build (LOCAL) — builds iOS app locally on GitHub macOS runner
# to bypass EAS cloud build quota limits.
#
# Triggered manually only (workflow_dispatch).
#
# Required repository secrets:
#   EXPO_TOKEN — an Expo access token with build permission.
#
# The Apple credentials are fetched from Expo servers (remote credentials).
# ──────────────────────────────────────────────────────────────
name: EAS Build (Local iOS)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        type: choice
        options:
          - production
          - preview
        default: production

defaults:
  run:
    working-directory: thesptoapp-v2-main

concurrency:
  group: eas-build-ios
  cancel-in-progress: false

jobs:
  build-ios:
    name: Build iOS (${{ github.event.inputs.profile }}) - Local
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: thesptoapp-v2-main/package-lock.json

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Fastlane
        run: |
          brew install fastlane
          gem install cocoapods

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build iOS App (Local)
        run: |
          eas build --platform ios --profile ${{ github.event.inputs.profile }} --local --non-interactive --output ./thespotapp.ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: 1

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.run_number }}
          path: thesptoapp-v2-main/thespotapp.ipa
          retention-days: 14
