name: Build iOS App

on:
  workflow_dispatch:  # Manual trigger

env:
  WORKING_DIR: ./thesptoapp-v2-main

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create build directory
        run: mkdir -p ./build

      - name: Build iOS app locally
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "Starting LOCAL iOS build (not using EAS cloud)..."
          eas build --platform ios --profile production --local --non-interactive --output ../build/thespotapp.ipa
        env:
          EAS_BUILD_NO_EXPO_GO_WARNING: true

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ./build/thespotapp.ipa
          retention-days: 14
